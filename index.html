<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prime Motions — Learn ThePrimeagen's init.lua</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2300252e'/%3E%3Ctext x='5' y='23' font-family='monospace' font-size='15' font-weight='bold' fill='%232beede'%3E%26gt;_%3C/text%3E%3Crect x='22' y='8' width='6' height='16' rx='1' fill='%23b7fa00'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2300252e'/%3E%3Ctext x='5' y='23' font-family='monospace' font-size='15' font-weight='bold' fill='%232beede'%3E%26gt;_%3C/text%3E%3Crect x='22' y='8' width='6' height='16' rx='1' fill='%23b7fa00'/%3E%3C/svg%3E" />
<style>
  :root{
    /* solarized-osaka (craftzdog) — from dotfiles-public */
    --bg:#00141a; --bg2:#00252e; --bg3:#073541; --ov:#001d24;
    --txt:#b3bdbd; --sub:#839495; --muted:#647a82;
    --pine:#278bd3; --foam:#2beede; --iris:#9ca0ed; --gold:#ffbf00;
    --rose:#f85e20; --love:#f254a1; --green:#b7fa00;
    --hl:#103f4c; --line:#22454f;
    --mono:"JetBrains Mono",ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:radial-gradient(1200px 700px at 70% -10%,#04222b,var(--bg));
    color:var(--txt);font-family:var(--mono);font-size:14px;line-height:1.5;
    overflow:hidden;
  }
  .app{display:grid;grid-template-columns:248px 1fr 320px;grid-template-rows:100vh;}
  /* ---- sidebar ---- */
  .side{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;padding:14px 0;}
  .brand{padding:4px 18px 14px;border-bottom:1px solid var(--line);margin-bottom:8px}
  .brand h1{font-size:15px;margin:0;letter-spacing:.3px}
  .brand h1 .v{color:var(--foam)}
  .brand p{margin:4px 0 0;color:var(--muted);font-size:11px}
  .lv{display:flex;gap:9px;align-items:center;padding:7px 18px;cursor:pointer;color:var(--sub);
      border-left:2px solid transparent;font-size:12.5px}
  .lv:hover{background:var(--bg3);color:var(--txt)}
  .lv.active{background:var(--hl);color:var(--txt);border-left-color:var(--foam)}
  .lv .num{width:20px;color:var(--muted);text-align:right;font-size:11px;flex:none}
  .lv.done .num{color:var(--green)}
  .lv .dot{width:8px;height:8px;border-radius:50%;background:var(--line);flex:none}
  .lv.done .dot{background:var(--green);box-shadow:0 0 7px var(--green)}
  .lv .t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .grp{padding:14px 18px 5px;color:var(--iris);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase}
  /* ---- main ---- */
  .main{display:flex;flex-direction:column;min-width:0;background:var(--bg);position:relative}
  .topbar{display:flex;align-items:center;gap:14px;padding:11px 20px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .topbar .goal{flex:1;min-width:0}
  .topbar .goal .lvt{font-size:12px;color:var(--muted)}
  .topbar .goal .lvg{font-size:13.5px;color:var(--rose)}
  .stat{display:flex;gap:7px;align-items:center;font-size:11.5px;color:var(--sub)}
  .stat b{color:var(--foam);font-weight:600}
  .btn{background:var(--bg3);color:var(--sub);border:1px solid var(--line);border-radius:6px;
       padding:5px 11px;cursor:pointer;font-family:inherit;font-size:12px}
  .btn:hover{background:var(--hl);color:var(--txt)}
  .editorwrap{flex:1;display:flex;flex-direction:column;min-height:0;padding:18px 22px}
  .editor{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:9px;overflow:hidden;
          display:flex;flex-direction:column;box-shadow:0 18px 50px -20px #000;min-height:0;position:relative}
  .buf{flex:1;overflow:auto;padding:8px 0;position:relative;outline:none}
  .row{display:flex;white-space:pre;font-variant-ligatures:none}
  .gut{width:54px;flex:none;text-align:right;padding-right:14px;color:var(--muted);user-select:none}
  .row.cur .gut{color:var(--gold)}
  .txt{flex:1;padding-right:18px;position:relative}
  /* colorcolumn at 80 */
  .ccline{position:absolute;top:0;bottom:0;width:1px;background:#0a2e38;pointer-events:none}
  .cur-cell{background:var(--foam);color:#00141a;border-radius:1px}
  /* insert mode: a thin vertical line (caret) at the insertion point */
  .cur-cell.ins{background:transparent;color:inherit;position:relative}
  .cur-cell.ins::before{content:"";position:absolute;left:-1px;top:1px;bottom:1px;width:2px;
       background:var(--green);border-radius:1px;animation:caretblink 1.1s steps(1,end) infinite}
  @keyframes caretblink{0%,49%{opacity:1}50%,100%{opacity:0}}
  .sel{background:#0e3a46}
  .statusline{display:flex;align-items:center;gap:0;border-top:1px solid var(--line);
              background:var(--bg3);font-size:12px}
  .mode{padding:4px 14px;font-weight:700;letter-spacing:1px;color:#00141a}
  .mode.normal{background:var(--foam)} .mode.insert{background:var(--green)}
  .mode.visual{background:var(--iris)} .mode.vline{background:var(--gold)}
  .mode.cmd{background:var(--rose)}
  .stitem{padding:4px 12px;color:var(--sub);border-right:1px solid var(--line)}
  .stspace{flex:1}
  .cmdline{padding:5px 14px;color:var(--rose);min-height:27px;font-size:13px}
  /* ---- lesson panel ---- */
  .lesson{background:var(--bg2);border-left:1px solid var(--line);overflow-y:auto;padding:18px 18px 40px}
  .lesson h2{font-size:14px;margin:0 0 4px;color:var(--foam)}
  .lesson .sub{color:var(--muted);font-size:11.5px;margin-bottom:14px}
  .lesson p{color:var(--sub);font-size:12.5px}
  .lesson .card{background:var(--bg3);border:1px solid var(--line);border-radius:8px;padding:12px 13px;margin-bottom:13px}
  .lesson .card.do{border-color:var(--pine)}
  .lesson .card h3{margin:0 0 7px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--iris)}
  kbd{background:#00171d;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;
      padding:1px 6px;font-family:var(--mono);font-size:11.5px;color:var(--gold);white-space:nowrap}
  .lesson code{background:#00171d;padding:1px 5px;border-radius:4px;color:var(--rose);font-size:11.5px}
  .keylist{list-style:none;padding:0;margin:0}
  .keylist li{display:flex;gap:9px;align-items:baseline;padding:4px 0;border-bottom:1px dashed var(--line);font-size:12px}
  .keylist li:last-child{border:0}
  .keylist .d{color:var(--sub)}
  .why{color:var(--muted);font-size:11.5px;font-style:italic;margin-top:7px}
  /* toast + win */
  .toast{position:absolute;left:50%;top:18px;transform:translateX(-50%);background:var(--love);
         color:#00141a;padding:7px 16px;border-radius:7px;font-size:12.5px;font-weight:600;
         opacity:0;pointer-events:none;transition:opacity .15s;z-index:40}
  .toast.show{opacity:1}
  .win{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:50;
       background:rgba(0,20,26,.82);backdrop-filter:blur(3px)}
  .win.show{display:flex;animation:fade .25s}
  .wincard{background:var(--bg2);border:1px solid var(--foam);border-radius:14px;padding:28px 34px;text-align:center;
           box-shadow:0 0 60px -10px var(--foam)}
  .wincard .big{font-size:34px}
  .wincard h2{margin:8px 0 4px;color:var(--foam)}
  .wincard p{color:var(--sub);margin:2px 0 18px}
  .wincard .par{color:var(--gold);font-size:13px;margin-bottom:16px}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .shake{animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  /* overlay popups (telescope/netrw/etc) */
  .pop{position:absolute;inset:0;display:none;align-items:flex-start;justify-content:center;padding-top:60px;z-index:45;
       background:rgba(0,20,26,.55)}
  .pop.show{display:flex;animation:fade .15s}
  .popbox{width:560px;max-width:88%;background:var(--ov);border:1px solid var(--iris);border-radius:10px;overflow:hidden;
          box-shadow:0 24px 60px -16px #000}
  .pophead{padding:9px 14px;color:var(--iris);border-bottom:1px solid var(--line);font-size:12px;display:flex;justify-content:space-between}
  .popbody{padding:8px 0;max-height:300px;overflow:auto}
  .poprow{padding:5px 16px;color:var(--sub);font-size:12.5px}
  .poprow.sel{background:var(--hl);color:var(--txt);border-left:2px solid var(--foam)}
  /* nvim-cmp completion menu */
  .cmp{position:absolute;display:none;z-index:30;background:var(--ov);border:1px solid var(--iris);
       border-radius:7px;min-width:210px;max-height:180px;overflow:auto;box-shadow:0 14px 34px -10px #000;font-size:12.5px}
  .cmprow{padding:3px 12px 3px 10px;color:var(--sub);display:flex;gap:9px;align-items:center;white-space:nowrap}
  .cmprow.sel{background:var(--hl);color:var(--txt)}
  .cmprow .ic{width:7px;height:7px;border-radius:2px;background:var(--foam);flex:none}
  .cmprow .kind{margin-left:auto;color:var(--muted);font-size:10.5px}
  .popfoot{padding:7px 14px;border-top:1px solid var(--line);color:var(--muted);font-size:11px}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side"></aside>

  <section class="main" id="main">
    <div class="topbar">
      <div class="goal">
        <div class="lvt" id="lvTitle">Level</div>
        <div class="lvg" id="lvGoal">Goal</div>
      </div>
      <div class="stat">keys <b id="kc">0</b><span id="parWrap" style="display:none">/ par <b id="par">0</b></span></div>
      <button class="btn" id="resetBtn">⟲ reset</button>
    </div>

    <div class="editorwrap">
      <div class="editor" id="editor">
        <div class="buf" id="buf" tabindex="0"></div>
        <div class="cmp" id="cmp"></div>
        <div class="statusline">
          <div class="mode normal" id="modeBox">NORMAL</div>
          <div class="stitem" id="stFile">~/init.lua</div>
          <div class="stspace"></div>
          <div class="stitem" id="stPos">1:1</div>
          <div class="cmdline" id="cmdline"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="pop" id="pop">
      <div class="popbox">
        <div class="pophead"><span id="popTitle"></span><span style="color:var(--muted)">esc / C-c to close</span></div>
        <div class="popbody" id="popBody"></div>
        <div class="popfoot" id="popFoot"></div>
      </div>
    </div>

    <div class="win" id="win">
      <div class="wincard">
        <div class="big">🎉</div>
        <h2 id="winTitle">Level clear!</h2>
        <p id="winMsg"></p>
        <div class="par" id="winPar"></div>
        <button class="btn" id="nextBtn" style="font-size:14px;padding:9px 22px;color:var(--foam);border-color:var(--foam)">next level →</button>
      </div>
    </div>
  </section>

  <aside class="lesson" id="lesson"></aside>
</div>

<script>
/* =======================================================================
   Prime Motions — a tiny Neovim emulator that teaches ThePrimeagen's
   init.lua keymaps. Pure vanilla JS, no deps.
   ======================================================================= */
"use strict";

/* ---------- editor state ---------- */
const S = {
  lines:["~"], cursor:{row:0,col:0}, mode:"normal", anchor:null,
  reg:{text:"",linewise:false}, sysclip:"",
  pending:"", awaitLeader:false, leaderBuf:"",
  cmd:null, lastSearch:"", searchDir:1,
  undo:[], keyLog:[], keys:0, enteredInsert:false,
  popOpen:false, popKind:null, won:false, cmp:null,
};

/* ---------- helpers ---------- */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const curLine=()=>S.lines[S.cursor.row];
const maxCol=()=>{ const l=curLine().length; return S.mode==="insert"?l:Math.max(0,l-1); };
function clampCursor(){ S.cursor.row=clamp(S.cursor.row,0,S.lines.length-1);
  S.cursor.col=clamp(S.cursor.col,0,maxCol()); }
function snapshot(){ S.undo.push({lines:S.lines.slice(),cursor:{...S.cursor}});
  if(S.undo.length>200)S.undo.shift(); }
function log(k){ S.keyLog.push(k); }

/* word tokenisation for w/b/e */
function tokens(){
  const t=[]; const re=/\w+|[^\w\s]+/g;
  for(let r=0;r<S.lines.length;r++){ let m; re.lastIndex=0;
    while((m=re.exec(S.lines[r]))) t.push({row:r,c0:m.index,c1:m.index+m[0].length-1}); }
  return t;
}
const after=(a,b)=> a.row>b.row || (a.row===b.row && a.c0> b.col);
const before=(a,b)=> a.row<b.row || (a.row===b.row && a.c0< b.col);

/* User remaps movement to j k l ñ (hjkl shifted one key right on a Spanish
   keyboard): j=left, k=down, l=up, ñ=right.  Translate a pressed key into the
   canonical h/j/k/l motion. Returns "" for the now-unmapped h (scold), or null
   when the key isn't a movement key. */
function remapDir(key){
  switch(key){
    case"ñ":case"Ñ": return "l"; // right
    case"j": return "h";         // left
    case"k": return "j";         // down
    case"l": return "k";         // up
    case"h": return "";          // unmapped on purpose
  }
  return null;
}

/* ---------- motions ---------- */
function motion(m){
  const c=S.cursor;
  if(m==="w") m="b"; else if(m==="b") m="w";   // user swap: w → left, b → right
  switch(m){
    case"h":c.col=clamp(c.col-1,0,maxCol());break;
    case"l":c.col=clamp(c.col+1,0,maxCol());break;
    case"j":if(c.row<S.lines.length-1){c.row++;c.col=clamp(c.col,0,maxCol());}break;
    case"k":if(c.row>0){c.row--;c.col=clamp(c.col,0,maxCol());}break;
    case"0":c.col=0;break;
    case"$":c.col=maxCol();break;
    case"^":{const i=curLine().search(/\S/);c.col=i<0?0:i;}break;
    case"w":{const t=tokens().find(x=>after(x,c));if(t){c.row=t.row;c.col=t.c0;}break;}
    case"b":{const t=tokens().filter(x=>before(x,c)).pop();if(t){c.row=t.row;c.col=t.c0;}break;}
    case"e":{const t=tokens().find(x=>x.row>c.row||(x.row===c.row&&x.c1>c.col));if(t){c.row=t.row;c.col=t.c1;}break;}
    case"gg":c.row=0;{const i=curLine().search(/\S/);c.col=i<0?0:i;}break;
    case"G":c.row=S.lines.length-1;{const i=curLine().search(/\S/);c.col=i<0?0:i;}break;
  }
  clampCursor();
}

/* ---------- search ---------- */
function doSearch(pat,dir,fromNext){
  if(!pat)return false;
  const N=S.lines.length; let {row,col}=S.cursor;
  for(let i=0;i<=N;i++){
    if(dir>0){
      let start=(i===0&&!fromNext)?col:0; let r=(S.cursor.row+i)%N;
      if(i>0)start=0; const idx=S.lines[r].indexOf(pat,(i===0?col+(fromNext?1:0):0));
      if(idx>=0){S.cursor.row=r;S.cursor.col=idx;clampCursor();return true;}
    }else{
      let r=(S.cursor.row-i+N*2)%N;
      const hay=S.lines[r]; let lim=(i===0)?col-1:hay.length;
      const idx=hay.lastIndexOf(pat,lim);
      if(idx>=0&&!(i===0&&idx>=col)){S.cursor.row=r;S.cursor.col=idx;clampCursor();return true;}
    }
  }
  return false;
}

/* ---------- visual range ---------- */
function visualRange(){
  let a=S.anchor, b=S.cursor;
  let lo,hi;
  if(a.row<b.row||(a.row===b.row&&a.col<=b.col)){lo=a;hi=b;}else{lo=b;hi=a;}
  return {lo:{...lo},hi:{...hi}};
}
function isSelected(r,col){
  if(S.mode!=="visual"&&S.mode!=="vline")return false;
  const {lo,hi}=visualRange();
  if(S.mode==="vline")return r>=lo.row&&r<=hi.row;
  if(r<lo.row||r>hi.row)return false;
  if(r===lo.row&&r===hi.row)return col>=lo.col&&col<=hi.col;
  if(r===lo.row)return col>=lo.col;
  if(r===hi.row)return col<=hi.col;
  return true;
}
function selectedText(){
  const {lo,hi}=visualRange();
  if(S.mode==="vline"){ return {text:S.lines.slice(lo.row,hi.row+1).join("\n"),linewise:true}; }
  if(lo.row===hi.row) return {text:S.lines[lo.row].slice(lo.col,hi.col+1),linewise:false};
  let out=[S.lines[lo.row].slice(lo.col)];
  for(let r=lo.row+1;r<hi.row;r++)out.push(S.lines[r]);
  out.push(S.lines[hi.row].slice(0,hi.col+1));
  return {text:out.join("\n"),linewise:false};
}
function deleteSelection(){
  const {lo,hi}=visualRange();
  if(S.mode==="vline"){
    S.lines.splice(lo.row,hi.row-lo.row+1);
    if(S.lines.length===0)S.lines=[""];
    S.cursor={row:clamp(lo.row,0,S.lines.length-1),col:0};
  }else if(lo.row===hi.row){
    const l=S.lines[lo.row];
    S.lines[lo.row]=l.slice(0,lo.col)+l.slice(hi.col+1);
    S.cursor={row:lo.row,col:lo.col};
  }else{
    const head=S.lines[lo.row].slice(0,lo.col);
    const tail=S.lines[hi.row].slice(hi.col+1);
    S.lines.splice(lo.row,hi.row-lo.row+1,head+tail);
    S.cursor={row:lo.row,col:lo.col};
  }
  S.mode="normal";S.anchor=null;clampCursor();
}

/* ---------- popups (telescope/netrw/etc) ---------- */
const POPS={
  netrw:{title:"netrw  ~/init.lua/",foot:"file explorer · k/l move · <CR> open",
    rows:["../","lua/","lua/theprimeagen/","init.lua","README.md","lazy-lock.json"]},
  files:{title:"Telescope find_files",foot:"<leader>pf · fuzzy find any file",
    rows:["lua/theprimeagen/remap.lua","lua/theprimeagen/set.lua","lua/theprimeagen/lazy/lsp.lua","lua/theprimeagen/lazy/telescope.lua","init.lua"]},
  git:{title:"Telescope git_files",foot:"<C-p> · only git-tracked files",
    rows:["init.lua","lua/theprimeagen/remap.lua","lua/theprimeagen/set.lua","README.md"]},
  grep:{title:"Grep > vim.keymap",foot:"<leader>ps · live grep across the project",
    rows:["remap.lua:2  vim.keymap.set(\"n\", \"<leader>pv\", vim.cmd.Ex)","remap.lua:9  vim.keymap.set(\"n\", \"J\", \"mzJ`z\")","telescope.lua:24  vim.keymap.set('n','<leader>pf',...)"]},
  undo:{title:"UndoTree",foot:"<leader>u · time-travel your edits",
    rows:["@ 0  (root)","@ 1  ──● typed code","@ 2    └─● deleted line","@ 3  ──● current"]},
  git_status:{title:"fugitive · git status",foot:"<leader>gs · stage/commit; <leader>p push, <leader>P pull",
    rows:["Head: master","Unstaged (1)","  M lua/theprimeagen/remap.lua","Untracked (1)","  index.html"]},
  harpoon:{title:"harpoon · quick menu",foot:"press 1–4 to jump · esc to close",
    rows:["1   lua/theprimeagen/remap.lua","2   lua/theprimeagen/set.lua","3   init.lua","4   lua/theprimeagen/lazy/lsp.lua"]},
  trouble:{title:"Trouble · Diagnostics",foot:"<leader>tt toggle · ]t / [t cycle items",
    rows:["init.lua  ●1  ⚠ 0","remap.lua:55  E  undefined global 'err'","set.lua:31  W  trailing whitespace"]},
};
function openPop(kind){
  const p=POPS[kind]; if(!p)return;
  document.getElementById("popTitle").textContent=p.title;
  document.getElementById("popFoot").textContent=p.foot;
  document.getElementById("popBody").innerHTML=p.rows.map((r,i)=>
    `<div class="poprow${i===(kind==='netrw'?3:0)?' sel':''}">${esc(r)}</div>`).join("");
  document.getElementById("pop").classList.add("show");
  S.popOpen=true; S.popKind=kind;
}
function closePop(){ document.getElementById("pop").classList.remove("show"); S.popOpen=false; S.popKind=null; }

/* ---------- command execution ---------- */
function setMode(m){ S.mode=m; if(m==="insert")S.enteredInsert=true; }

function handleNormal(key,e){
  // pending operators / multi-key (g, d, y, c)
  if(S.pending){
    const op=S.pending; S.pending="";
    if(op==="g"){ if(key==="g"){motion("gg");log("gg");} return; }
    // treesitter text object: pending like "da"/"di"/"ca"/"yi" awaiting the object char (f = @function)
    if(/^[dyc][ai]$/.test(op)){ if(key==="f") execTextObject(op[0],op[1]); return; }
    if(op==="d"||op==="y"||op==="c"){
      if(key==="a"||key==="i"){ S.pending=op+key; return; } // start a text object (af/if)
      // linewise double (dd/yy/cc) or simple motions
      if(key===op){
        snapshot();
        if(op==="y"){S.reg={text:curLine(),linewise:true};log("yy");}
        else{ S.reg={text:curLine(),linewise:true};
          S.lines.splice(S.cursor.row,1); if(!S.lines.length)S.lines=[""];
          clampCursor(); if(op==="c"){S.lines.splice(S.cursor.row,0,"");setMode("insert");S.cursor.col=0;log("cc");}else log("dd"); }
        return;
      }
      if(["w","e","$","0","^","b"].includes(key)){
        snapshot(); const start={...S.cursor}; motion(key); const end={...S.cursor};
        let lo=start,hi=end; if(end.col<start.col){lo=end;hi=start;}
        const line=S.lines[lo.row];
        const cut=line.slice(lo.col, key==="$"?undefined:(key==="e"?hi.col+1:hi.col));
        const rest=line.slice(0,lo.col)+(key==="$"?"":line.slice(key==="e"?hi.col+1:hi.col));
        if(op==="y"){S.reg={text:cut,linewise:false};S.cursor={...start};}
        else{S.reg={text:cut,linewise:false};S.lines[lo.row]=rest;S.cursor={...lo};
          if(op==="c")setMode("insert");}
        clampCursor(); log(op+key); return;
      }
      return;
    }
  }

  // leader sequence
  if(S.awaitLeader){
    S.leaderBuf+=key;
    if(resolveLeader(S.leaderBuf)){ S.awaitLeader=false; S.leaderBuf=""; }
    else if(!leaderHasPrefix(S.leaderBuf)){ S.awaitLeader=false; S.leaderBuf=""; }
    return;
  }

  // jklñ movement remap
  { const d=remapDir(key);
    if(d===""){ toast("Use j k l ñ — h is unmapped!"); shake(); return; }
    if(d!==null) key=d; }

  switch(key){
    case" ": S.awaitLeader=true; S.leaderBuf=""; return;     // <leader>
    case"h":case"j":case"k":case"l":case"w":case"b":case"e":
    case"0":case"$":case"^": motion(key); log(key); return;
    case"g": S.pending="g"; return;
    case"G": motion("G"); log("G"); return;
    case"d":case"y":case"c": S.pending=key; return;
    case"x": snapshot(); { const l=curLine(); if(l.length){S.reg={text:l[S.cursor.col]||"",linewise:false};
              S.lines[S.cursor.row]=l.slice(0,S.cursor.col)+l.slice(S.cursor.col+1);clampCursor();} } log("x"); return;
    // swapped: i appends (after char), a inserts (before char) — inverse of stock vim
    case"i": setMode("insert"); S.cursor.col=Math.min(curLine().length,S.cursor.col+1); log("i"); return;
    case"a": setMode("insert"); log("a"); return;
    case"A": setMode("insert"); S.cursor.col=curLine().length; log("A"); return;
    case"o": snapshot(); S.lines.splice(S.cursor.row+1,0,""); S.cursor={row:S.cursor.row+1,col:0}; setMode("insert"); log("o"); return;
    case"O": snapshot(); S.lines.splice(S.cursor.row,0,""); S.cursor.col=0; setMode("insert"); log("O"); return;
    case"v": setMode("visual"); S.anchor={...S.cursor}; log("v"); return;
    case"V": setMode("vline"); S.anchor={...S.cursor}; log("V"); return;
    case"J": snapshot(); { const r=S.cursor.row; if(r<S.lines.length-1){
              const keepCol=S.cursor.col; const merged=S.lines[r].replace(/\s+$/,"")+" "+S.lines[r+1].replace(/^\s+/,"");
              S.lines.splice(r,2,merged); S.cursor.col=keepCol; clampCursor(); } } log("J"); return; // mzJ`z keeps cursor
    case"p": snapshot(); pasteReg(true); log("p"); return;
    case"P": snapshot(); pasteReg(false); log("P"); return;
    case"u": if(S.undo.length){const st=S.undo.pop();S.lines=st.lines;S.cursor=st.cursor;clampCursor();} log("u"); return;
    case"n": if(doSearch(S.lastSearch,S.searchDir,true)){centerCursor();} log("n"); return;
    case"N": if(doSearch(S.lastSearch,-S.searchDir,true)){centerCursor();} log("N"); return;
    case"/": S.cmd={type:"search",text:""}; setMode("cmd"); return;
    case"Q": toast("Q is <nop> in this config — recording disabled on purpose"); log("Q"); return;
  }
}

/* treesitter @function text object (af/if), lazy/treesitter.lua */
function findFunction(row){
  let os=-1;
  for(let r=row;r>=0;r--){ if(/\bfunction\b/.test(S.lines[r])){ os=r; break; } }
  if(os<0) return null;
  let oe=-1;
  for(let r=os+1;r<S.lines.length;r++){ if(/^\s*end\b/.test(S.lines[r])){ oe=r; break; } }
  if(oe<0) for(let r=os+1;r<S.lines.length;r++){ if(/^\s*}/.test(S.lines[r])){ oe=r; break; } }
  if(oe<0) return null;
  return {os,oe,is:os+1,ie:oe-1};
}
function execTextObject(op,scope){ // op: d/y/c ; scope: a (outer) | i (inner)
  const f=findFunction(S.cursor.row);
  if(!f){ toast("no @function under the cursor"); return; }
  snapshot();
  const r0=scope==="a"?f.os:f.is, r1=scope==="a"?f.oe:f.ie;
  if(r1>=r0){ S.reg={text:S.lines.slice(r0,r1+1).join("\n"),linewise:true}; }
  if(op==="y"){ S.cursor={row:r0,col:0}; }
  else{
    if(r1>=r0){ S.lines.splice(r0,r1-r0+1); if(!S.lines.length)S.lines=[""]; }
    if(op==="c"){ S.lines.splice(r0,0,""); S.cursor={row:r0,col:0}; setMode("insert"); }
    else S.cursor={row:clamp(r0,0,S.lines.length-1),col:0};
  }
  clampCursor(); log(op+scope+"f");
  toast(`${op}${scope}f → ${scope==="a"?"around":"inner"} @function`);
}

function pasteReg(after){
  const {text,linewise}=S.reg; if(text===""&&!linewise&&S.reg.text==="")return;
  if(linewise){ const idx=S.cursor.row+(after?1:0); const ls=text.split("\n");
    S.lines.splice(idx,0,...ls); S.cursor={row:idx,col:0}; }
  else{ const l=curLine(); const at=S.cursor.col+(after?1:0);
    S.lines[S.cursor.row]=l.slice(0,at)+text+l.slice(at); S.cursor.col=at+text.length-1; }
  clampCursor();
}

/* ---- leader maps (this config's signature) ---- */
const LEADER_NORMAL=["pv","pf","ps","pws","pWs","vh","u","gs","tt","zz","zZ","s","x"," ","k","j","a","A","1","2","3","4"];
function leaderHasPrefix(buf){ return LEADER_NORMAL.some(m=>m.startsWith(buf)); }
function resolveLeader(buf){
  const map={
    "pv":()=>{openPop("netrw");toast("<leader>pv → :Ex (netrw)");},
    "pf":()=>{openPop("files");toast("<leader>pf → Telescope find_files");},
    "ps":()=>{openPop("grep");toast("<leader>ps → live grep");},
    "pws":()=>{openPop("grep");toast("<leader>pws → grep word under cursor");},
    "pWs":()=>{openPop("grep");toast("<leader>pWs → grep WORD under cursor");},
    "vh":()=>{openPop("files");toast("<leader>vh → help tags");},
    "u":()=>{openPop("undo");toast("<leader>u → UndoTree");},
    "gs":()=>{openPop("git_status");toast("<leader>gs → fugitive :Git");},
    "tt":()=>{openPop("trouble");toast("<leader>tt → Trouble");},
    "zz":()=>toast("<leader>zz → Zen Mode (90 cols, keep numbers)"),
    "zZ":()=>toast("<leader>zZ → Zen Mode (80 cols, no numbers)"),
    "x":()=>toast("<leader>x → :!chmod +x %  (make file executable)"),
    "k":()=>toast("<leader>k → :lnext  (location list)"),
    "j":()=>toast("<leader>j → :lprev  (location list)"),
    " ":()=>toast("<leader><leader> → :so  (re-source config)"),
    "a":()=>toast("<leader>a → harpoon: add this file to the list"),
    "A":()=>toast("<leader>A → harpoon: prepend file to the list"),
    "1":()=>toast("<leader>1 → harpoon: jump to file 1"),
    "2":()=>toast("<leader>2 → harpoon: jump to file 2"),
    "3":()=>toast("<leader>3 → harpoon: jump to file 3"),
    "4":()=>toast("<leader>4 → harpoon: jump to file 4"),
    "s":()=>{ const w=wordUnderCursor();
        S.cmd={type:"subst",word:w,text:""}; setMode("cmd"); },
  };
  if(map[buf]){ const wasInsertSearch=buf==="s"; map[buf](); log("<leader>"+buf);
    if(!wasInsertSearch && buf!=="s") {} return true; }
  return false;
}
function wordUnderCursor(){
  const l=curLine(); let s=S.cursor.col,e=S.cursor.col;
  while(s>0&&/\w/.test(l[s-1]))s--; while(e<l.length&&/\w/.test(l[e]))e++;
  return l.slice(s,e);
}

/* ---- visual-mode leader maps ---- */
function handleVisual(key,e){
  if(S.awaitLeader){
    S.awaitLeader=false; const k=key; const buf=k;
    if(buf==="p"){ // greatest remap: "_dP — paste over, keep register
      snapshot(); const reg={...S.reg};
      const {lo}=visualRange();                 // insertion point = where selection started
      const row=lo.row, at=lo.col;
      deleteSelection();
      const l=S.lines[row];
      S.lines[row]=l.slice(0,at)+reg.text+l.slice(at);
      S.cursor={row,col:at+Math.max(0,reg.text.length-1)}; S.reg=reg; clampCursor();
      log("<leader>p"); toast('<leader>p → "_dP  (paste, keep your yank!)'); return;
    }
    if(buf==="y"){ const sel=selectedText(); S.sysclip=sel.text; S.reg=sel; S.mode="normal";S.anchor=null;
      log("<leader>y"); toast('<leader>y → "+y  (yank to SYSTEM clipboard)'); return; }
    if(buf==="d"){ snapshot(); const reg={...S.reg}; deleteSelection(); S.reg=reg;
      log("<leader>d"); toast('<leader>d → "_d  (delete to black hole, yank kept)'); return; }
    toast("no visual <leader>"+buf); return;
  }
  // jklñ movement remap
  { const d=remapDir(key);
    if(d===""){ toast("Use j k l ñ — h is unmapped!"); shake(); return; }
    if(d!==null) key=d; }
  switch(key){
    case" ": S.awaitLeader=true; return;
    case"h":case"j":case"k":case"l":case"w":case"b":case"e":case"0":case"$":case"^":case"G":
      motion(key);log(key);return;
    case"g": S.pending="g"; return;
    case"o": { const t=S.anchor; S.anchor={...S.cursor}; S.cursor=t; return; } // swap ends
    case"d":case"x": snapshot(); S.reg=selectedText(); deleteSelection(); log("d"); return;
    case"y": S.reg=selectedText(); S.cursor={...visualRange().lo}; S.mode="normal";S.anchor=null; log("y"); return;
    case"c": snapshot(); S.reg=selectedText(); deleteSelection(); setMode("insert"); log("c"); return;
    case"J": snapshot(); moveLines(1); log("J"); return;   // visual line move down
    case"K": snapshot(); moveLines(-1); log("K"); return;  // visual line move up
    case"v":case"V": S.mode="normal";S.anchor=null; return;
  }
  if(S.pending==="g"&&key==="g"){S.pending="";motion("gg");log("gg");}
}
function moveLines(dir){
  const {lo,hi}=visualRange();
  if(dir>0){ if(hi.row>=S.lines.length-1)return;
    const moved=S.lines.splice(hi.row+1,1)[0]; S.lines.splice(lo.row,0,moved);
  }else{ if(lo.row<=0)return;
    const moved=S.lines.splice(lo.row-1,1)[0]; S.lines.splice(hi.row,0,moved);
  }
  S.cursor.row=clamp(S.cursor.row+dir,0,S.lines.length-1);
  S.anchor.row=clamp(S.anchor.row+dir,0,S.lines.length-1);
  clampCursor();
}

/* ---- insert mode ---- */
function openCmp(){
  const l=curLine(); let s=S.cursor.col;
  while(s>0&&/\w/.test(l[s-1]))s--;
  const prefix=l.slice(s,S.cursor.col);
  const pool=["compute","computed","comparison","complete","config","callback","capacity","require","return","results"];
  let items=pool.filter(x=>x.startsWith(prefix)&&x!==prefix);
  if(!items.length) items=pool.slice(0,6);
  S.cmp={open:true,items,sel:0,start:s,prefix};
}
function cmpConfirm(){
  if(!S.cmp)return; snapshot();
  const item=S.cmp.items[S.cmp.sel], l=curLine();
  S.lines[S.cursor.row]=l.slice(0,S.cmp.start)+item+l.slice(S.cursor.col);
  S.cursor.col=S.cmp.start+item.length; S.cmp.open=false;
}
function handleInsert(key,e){
  // nvim-cmp completion menu (lazy/lsp.lua)
  if(S.cmp&&S.cmp.open){
    if(key==="<C-n>"){ S.cmp.sel=(S.cmp.sel+1)%S.cmp.items.length; log("<C-n>"); return; }
    if(key==="<C-p>"){ S.cmp.sel=(S.cmp.sel-1+S.cmp.items.length)%S.cmp.items.length; log("<C-p>"); return; }
    if(key==="<C-y>"){ cmpConfirm(); log("<C-y>"); toast('<C-y> → confirm completion'); return; }
    if(key==="<C-Space>"){ openCmp(); log("<C-Space>"); return; }
    if(key==="Escape"||key==="<C-c>"){ S.cmp.open=false; log(key==="<C-c>"?"<C-c>":"Esc"); return; }
    S.cmp.open=false; // any other key dismisses the menu, then types normally
  }
  if(key==="<C-Space>"){ openCmp(); log("<C-Space>"); toast('<C-Space> → trigger completion'); return; }
  if(key==="Escape"||key==="<C-c>"){ setMode("normal");
    S.cursor.col=Math.max(0,S.cursor.col-1); clampCursor(); log(key==="<C-c>"?"<C-c>":"Esc"); return; }
  if(key==="Backspace"){ snapshot(); const l=curLine();
    if(S.cursor.col>0){S.lines[S.cursor.row]=l.slice(0,S.cursor.col-1)+l.slice(S.cursor.col);S.cursor.col--;}
    else if(S.cursor.row>0){const prev=S.lines[S.cursor.row-1];S.cursor.col=prev.length;
      S.lines[S.cursor.row-1]=prev+l;S.lines.splice(S.cursor.row,1);S.cursor.row--;} return; }
  if(key==="Enter"){ snapshot(); const l=curLine();
    const head=l.slice(0,S.cursor.col),tail=l.slice(S.cursor.col);
    S.lines[S.cursor.row]=head; S.lines.splice(S.cursor.row+1,0,tail);
    S.cursor={row:S.cursor.row+1,col:0}; return; }
  if(key.length===1){ snapshot(); const l=curLine();
    S.lines[S.cursor.row]=l.slice(0,S.cursor.col)+key+l.slice(S.cursor.col); S.cursor.col++; }
}

/* ---- command line (search & substitute) ---- */
function handleCmd(key){
  if(key==="Escape"||key==="<C-c>"){ S.cmd=null; setMode("normal"); return; }
  if(key==="Enter"){
    if(S.cmd.type==="search"){ S.lastSearch=S.cmd.text; S.searchDir=1; S.mode="normal";
      if(doSearch(S.lastSearch,1,false))centerCursor(); S.cmd=null; log("/"+ S.lastSearch); }
    else if(S.cmd.type==="subst"){ const w=S.cmd.word, rep=S.cmd.text; S.mode="normal";
      if(w){ snapshot(); const re=new RegExp("\\b"+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","g");
        S.lines=S.lines.map(l=>l.replace(re,rep)); } clampCursor(); S.cmd=null; toast(`:%s/${w}/${rep}/gI`); }
    return;
  }
  if(key==="Backspace"){ S.cmd.text=S.cmd.text.slice(0,-1); return; }
  if(key.length===1) S.cmd.text+=key;
}

/* ---------- centering (zz / zzzv emulation) ---------- */
function centerCursor(){ S._center=true; }

/* ---------- key dispatch ---------- */
function keyName(e){
  const k=e.key;
  if(e.ctrlKey){
    const m={"d":"<C-d>","u":"<C-u>","p":"<C-p>","n":"<C-n>","y":"<C-y>","c":"<C-c>",
             "k":"<C-k>","j":"<C-j>","f":"<C-f>","e":"<C-e>"," ":"<C-Space>"};
    if(m[k.toLowerCase()])return m[k.toLowerCase()];
  }
  return k;
}
function onKey(e){
  if(S.won && e.key!=="Enter") return;
  if(["Control","Shift","Alt","Meta","CapsLock"].includes(e.key)) return; // ignore bare modifier presses
  const kn=keyName(e);

  // popups: in the harpoon menu, 1-4 jumps to that file; esc/C-c/q/Enter just close
  if(S.popOpen){
    e.preventDefault();
    if(S.popKind==="harpoon" && /^[1-4]$/.test(kn)){
      closePop(); log("<leader>"+kn); toast("→ harpoon file "+kn+"  (<leader>"+kn+")"); afterKey(); return;
    }
    if(kn==="Escape"||kn==="<C-c>"||kn==="Enter"||kn==="q"){ closePop(); render(); checkWin(); }
    return;
  }

  // global ctrl maps that work in normal/visual
  const handledCtrl=["<C-d>","<C-u>","<C-p>","<C-k>","<C-j>","<C-f>","<C-e>","<C-y>","<C-n>","<C-Space>"];
  if(handledCtrl.includes(kn) && (S.mode==="normal"||S.mode==="visual"||S.mode==="vline")){
    e.preventDefault(); ctrlMap(kn); afterKey(); return;
  }

  // arrow-key scold (teach hjkl)
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
    e.preventDefault(); toast("Use j k l ñ — no arrow keys!"); shake(); return;
  }

  e.preventDefault();
  S.keys++;
  if(S.mode==="insert") handleInsert(kn,e);
  else if(S.mode==="cmd") handleCmd(kn);
  else if(S.mode==="visual"||S.mode==="vline") handleVisual(kn,e);
  else handleNormal(kn,e);
  afterKey();
}
function ctrlMap(kn){
  switch(kn){
    case"<C-d>": S.cursor.row=clamp(S.cursor.row+8,0,S.lines.length-1);clampCursor();centerCursor();log("<C-d>");toast("<C-d>zz — half page down, re-centered");break;
    case"<C-u>": S.cursor.row=clamp(S.cursor.row-8,0,S.lines.length-1);clampCursor();centerCursor();log("<C-u>");toast("<C-u>zz — half page up, re-centered");break;
    case"<C-p>": openPop("git");toast("<C-p> → Telescope git_files");log("<C-p>");break;
    case"<C-k>": S.cursor.row=clamp(S.cursor.row+1,0,S.lines.length-1);clampCursor();centerCursor();log("<C-k>");toast("<C-k> → :cnext (quickfix)");break;
    case"<C-j>": S.cursor.row=clamp(S.cursor.row-1,0,S.lines.length-1);clampCursor();centerCursor();log("<C-j>");toast("<C-j> → :cprev (quickfix)");break;
    case"<C-f>": toast("<C-f> → tmux-sessionizer (project switcher)");log("<C-f>");break;
    case"<C-e>": openPop("harpoon");toast("<C-e> → harpoon quick menu");log("<C-e>");break;
    default: log(kn);
  }
}
function afterKey(){ render(); checkWin(); }

/* ---------- toast / shake ---------- */
let toastT=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }
function shake(){ const ed=document.getElementById("editor"); ed.classList.add("shake");
  setTimeout(()=>ed.classList.remove("shake"),300); }

/* ---------- rendering ---------- */
function render(){
  const buf=document.getElementById("buf");
  let html="";
  for(let r=0;r<S.lines.length;r++){
    const isCur=r===S.cursor.row;
    const relnum=isCur?(r+1):Math.abs(r-S.cursor.row);
    const line=S.lines[r];
    let body="";
    if(line.length===0){
      if(isCur && (S.mode==="normal"||S.mode==="visual"||S.mode==="vline"))
        body=`<span class="cur-cell">&nbsp;</span>`;
      else if(isCur && S.mode==="insert") body=`<span class="cur-cell ins">&nbsp;</span>`;
      else if(isSelected(r,0)) body=`<span class="sel">&nbsp;</span>`;
      else body="&nbsp;";
    }else{
      for(let c=0;c<line.length;c++){
        const ch=esc(line[c]);
        const onCur=isCur&&c===S.cursor.col;
        const sel=isSelected(r,c);
        if(onCur&&(S.mode==="normal"||S.mode==="visual"||S.mode==="vline"))
          body+=`<span class="cur-cell">${ch}</span>`;
        else if(onCur&&S.mode==="insert") body+=`<span class="cur-cell ins">${ch}</span>`;
        else if(sel) body+=`<span class="sel">${ch}</span>`;
        else body+=ch;
      }
      if(isCur&&S.cursor.col>=line.length){
        body+= S.mode==="insert"?`<span class="cur-cell ins">&nbsp;</span>`:`<span class="cur-cell">&nbsp;</span>`;
      }
    }
    html+=`<div class="row${isCur?' cur':''}" data-r="${r}"><span class="gut">${relnum}</span>`+
          `<span class="txt">${body}<span class="ccline" style="left:${80}ch"></span></span></div>`;
  }
  buf.innerHTML=html;
  // status line
  const mb=document.getElementById("modeBox");
  const map={normal:["NORMAL","normal"],insert:["INSERT","insert"],visual:["VISUAL","visual"],vline:["V-LINE","vline"],cmd:["COMMAND","cmd"]};
  const[label,cls]=map[S.mode]; mb.textContent=label; mb.className="mode "+cls;
  document.getElementById("stPos").textContent=(S.cursor.row+1)+":"+(S.cursor.col+1);
  const cl=document.getElementById("cmdline");
  cl.textContent = S.cmd? (S.cmd.type==="search"?"/"+S.cmd.text : `:%s/${S.cmd.word}/${S.cmd.text}`) : "";
  document.getElementById("kc").textContent=S.keys;
  // center if requested
  const curRow=buf.querySelector(".row.cur");
  if(curRow){ curRow.scrollIntoView({block:S._center?"center":"nearest"}); }
  S._center=false;
  // nvim-cmp floating menu
  const cmpEl=document.getElementById("cmp");
  if(S.cmp&&S.cmp.open&&S.mode==="insert"){
    cmpEl.innerHTML=S.cmp.items.map((it,i)=>
      `<div class="cmprow${i===S.cmp.sel?' sel':''}"><span class="ic"></span>${esc(it)}<span class="kind">text</span></div>`).join("");
    const cell=buf.querySelector(".row.cur .cur-cell"), ed=document.getElementById("editor");
    if(cell){ const cr=cell.getBoundingClientRect(), er=ed.getBoundingClientRect();
      cmpEl.style.left=(cr.left-er.left)+"px"; cmpEl.style.top=(cr.bottom-er.top+2)+"px"; }
    cmpEl.style.display="block";
  }else cmpEl.style.display="none";
}

/* flatten groups + levels into an index */
const PLAYABLE=LEVELS.filter(x=>!x.group);
let curIdx=0;
const done=new Set();

function loadLevel(i){
  curIdx=i; const lv=PLAYABLE[i];
  S.lines=lv.buf.slice(); S.cursor={...lv.cur}; S.mode="normal"; S.anchor=null;
  S.reg=lv.preReg?{...lv.preReg}:{text:"",linewise:false};
  S.sysclip=""; S.pending="";S.awaitLeader=false;S.leaderBuf="";S.cmd=null;
  S.lastSearch="";S.undo=[];S.keyLog=[];S.keys=0;S.enteredInsert=false;S.won=false;S.cmp=null;
  clampCursor();
  document.getElementById("lvTitle").textContent=`Level ${i+1} / ${PLAYABLE.length} · ${lv.title}`;
  document.getElementById("lvGoal").textContent=lv.goal;
  document.getElementById("lesson").innerHTML=lv.lesson;
  const pw=document.getElementById("parWrap");
  if(lv.par){pw.style.display="inline";document.getElementById("par").textContent=lv.par;}else pw.style.display="none";
  document.getElementById("win").classList.remove("show");
  closePop();
  buildSidebar();
  render();
  document.getElementById("buf").focus();
}

function checkWin(){
  if(S.won)return;
  const lv=PLAYABLE[curIdx];
  let ok=false; try{ ok=lv.check(); }catch(e){ ok=false; }
  if(ok){
    S.won=true; done.add(curIdx); buildSidebar();
    const wp=document.getElementById("winPar");
    if(lv.par){ const good=S.keys<=lv.par;
      wp.textContent=`${S.keys} keystrokes · par ${lv.par} ${good?"— 🏌 under par!":""}`; }
    else wp.textContent=`${S.keys} keystrokes`;
    document.getElementById("winTitle").textContent = curIdx===PLAYABLE.length-1?"🎓 Config mastered!":"Level clear!";
    document.getElementById("winMsg").textContent = curIdx===PLAYABLE.length-1
      ? "You've learned ThePrimeagen's init.lua end to end." : lv.goal;
    const nb=document.getElementById("nextBtn");
    nb.textContent = curIdx===PLAYABLE.length-1?"↺ play again":"next level →";
    setTimeout(()=>document.getElementById("win").classList.add("show"),260);
  }
}

/* ---------- sidebar ---------- */
function buildSidebar(){
  const side=document.getElementById("side");
  let html=`<div class="brand"><h1>Prime<span class="v">Motions</span></h1>
    <p>learn ThePrimeagen's init.lua</p></div>`;
  let pi=0;
  for(const item of LEVELS){
    if(item.group){ html+=`<div class="grp">${item.group}</div>`; continue; }
    const i=pi++; const cls=(i===curIdx?"active ":"")+(done.has(i)?"done ":"");
    html+=`<div class="lv ${cls}" data-i="${i}"><span class="num">${i+1}</span>
      <span class="dot"></span><span class="t">${esc(item.title)}</span></div>`;
  }
  side.innerHTML=html;
  side.querySelectorAll(".lv").forEach(el=>el.addEventListener("click",()=>loadLevel(+el.dataset.i)));
}

/* ---------- wiring ---------- */
document.addEventListener("keydown",onKey);
document.getElementById("resetBtn").addEventListener("click",()=>loadLevel(curIdx));
document.getElementById("nextBtn").addEventListener("click",()=>{
  if(curIdx===PLAYABLE.length-1) loadLevel(0);
  else loadLevel(curIdx+1);
});
document.getElementById("buf").addEventListener("click",()=>document.getElementById("buf").focus());
loadLevel(0);
</script>
</body>
</html>
