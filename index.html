<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prime Motions — Learn ThePrimeagen's init.lua</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2300252e'/%3E%3Ctext x='5' y='23' font-family='monospace' font-size='15' font-weight='bold' fill='%232beede'%3E%26gt;_%3C/text%3E%3Crect x='22' y='8' width='6' height='16' rx='1' fill='%23b7fa00'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2300252e'/%3E%3Ctext x='5' y='23' font-family='monospace' font-size='15' font-weight='bold' fill='%232beede'%3E%26gt;_%3C/text%3E%3Crect x='22' y='8' width='6' height='16' rx='1' fill='%23b7fa00'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <aside class="side" id="side"></aside>

  <section class="main" id="main">
    <div class="topbar">
      <div class="goal">
        <div class="lvt" id="lvTitle">Level</div>
        <div class="lvg" id="lvGoal">Goal</div>
      </div>
      <div class="stat">keys <b id="kc">0</b><span id="parWrap" style="display:none">/ par <b id="par">0</b></span></div>
      <button class="btn" id="resetBtn">⟲ reset</button>
    </div>

    <div class="editorwrap">
      <div class="editor" id="editor">
        <div class="buf" id="buf" tabindex="0"></div>
        <div class="cmp" id="cmp"></div>
        <div class="statusline">
          <div class="mode normal" id="modeBox">NORMAL</div>
          <div class="stitem" id="stFile">~/init.lua</div>
          <div class="stspace"></div>
          <div class="stitem" id="stPos">1:1</div>
          <div class="cmdline" id="cmdline"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="pop" id="pop">
      <div class="popbox">
        <div class="pophead"><span id="popTitle"></span><span style="color:var(--muted)">esc / C-c to close</span></div>
        <div class="popbody" id="popBody"></div>
        <div class="popfoot" id="popFoot"></div>
      </div>
    </div>

    <div class="win" id="win">
      <div class="wincard">
        <div class="big">🎉</div>
        <h2 id="winTitle">Level clear!</h2>
        <p id="winMsg"></p>
        <div class="par" id="winPar"></div>
        <button class="btn" id="nextBtn" style="font-size:14px;padding:9px 22px;color:var(--foam);border-color:var(--foam)">next level →</button>
      </div>
    </div>
  </section>

  <aside class="lesson" id="lesson"></aside>
</div>

<!-- Prime Motions — a tiny Neovim emulator. Loaded as plain scripts in order;
     they share one global scope, so game.js (the bootstrap) must come last. -->
<script src="js/state.js"></script>
<script src="js/motions.js"></script>
<script src="js/popups.js"></script>
<script src="js/modes.js"></script>
<script src="js/render.js"></script>
<script src="js/input.js"></script>
<script src="js/levels.js"></script>
<script src="js/game.js"></script>
</body>
</html>
